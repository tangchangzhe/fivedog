<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掌控 - 让今天清晰可见</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    
    * { font-family: 'Inter', -apple-system, sans-serif; }
    
    body {
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
    }
    
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .input-glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }
    
    .message-in {
      animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse-soft {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    
    .recording { animation: pulse-soft 1.5s ease-in-out infinite; }
    
    .plan-card {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body class="text-white">
  <div class="max-w-2xl mx-auto px-4 py-6 sm:px-6 sm:py-12">
    <!-- Header -->
    <header class="text-center mb-6 sm:mb-12">
      <h1 class="text-2xl sm:text-4xl font-light tracking-tight mb-2 sm:mb-3">掌控</h1>
      <p class="text-white/40 text-xs sm:text-sm">说出你的计划，让今天清晰可见</p>
      <button onclick="resetChat()" class="mt-3 sm:mt-4 text-white/20 text-xs hover:text-white/50 transition">重新开始</button>
    </header>

    <!-- Chat Container -->
    <div id="chat" class="space-y-3 sm:space-y-4 mb-4 sm:mb-6 min-h-[150px] max-h-[40vh] sm:max-h-[50vh] overflow-y-auto pr-1 sm:pr-2">
      <!-- Messages will appear here -->
    </div>

    <!-- Current Plan Display -->
    <div id="planDisplay" class="hidden mb-4 sm:mb-6">
      <div class="flex items-center justify-between mb-3 sm:mb-4">
        <span class="text-white/60 text-xs sm:text-sm">今日计划</span>
        <button onclick="clearPlan()" class="text-white/30 text-xs hover:text-white/60 transition">清除</button>
      </div>
      <div id="planCards" class="space-y-2"></div>
    </div>

    <!-- Input Area -->
    <div class="glass rounded-xl sm:rounded-2xl p-3 sm:p-4">
      <div class="flex items-center gap-2 sm:gap-3">
        <button 
          id="micBtn"
          onclick="toggleRecording()"
          class="w-8 h-8 rounded-full input-glass flex items-center justify-center transition-all hover:bg-white/10 flex-shrink-0"
        >
          <svg id="micIcon" class="w-4 h-4 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
        </button>
        <input 
          id="input"
          type="text" 
          placeholder="说说今天要做什么..."
          class="flex-1 bg-transparent outline-none text-white placeholder-white/30 text-xs sm:text-sm min-w-0"
          onkeydown="if(event.key==='Enter')sendMessage()"
        >
        <button 
          onclick="sendMessage()"
          class="text-white/40 hover:text-white transition text-xs sm:text-sm px-2 sm:px-4 py-2 flex-shrink-0"
        >
          发送
        </button>
      </div>
      <div id="recordingHint" class="hidden text-center text-white/30 text-xs mt-2 sm:mt-3">正在聆听...</div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 sm:mt-12">
      <p class="text-white/30 text-xs sm:text-sm tracking-wide mb-4 sm:mb-6">你的一天，由你定义</p>
      <p class="text-white/15 text-xs">FIVE</p>
    </div>
  </div>

  <script>
    let recognition = null;
    let isRecording = false;
    let messages = [];
    let currentPlan = null;

    // Initialize Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('input').value = transcript;
        sendMessage();
      };

      recognition.onend = () => {
        stopRecording();
      };

      recognition.onerror = () => {
        stopRecording();
      };
    }

    function toggleRecording() {
      if (!recognition) {
        alert('您的浏览器不支持语音识别');
        return;
      }
      
      if (isRecording) {
        recognition.stop();
        stopRecording();
      } else {
        recognition.start();
        startRecording();
      }
    }

    function startRecording() {
      isRecording = true;
      document.getElementById('micBtn').classList.add('bg-white/20');
      document.getElementById('micIcon').classList.add('recording', 'text-indigo-400');
      document.getElementById('recordingHint').classList.remove('hidden');
    }

    function stopRecording() {
      isRecording = false;
      document.getElementById('micBtn').classList.remove('bg-white/20');
      document.getElementById('micIcon').classList.remove('recording', 'text-indigo-400');
      document.getElementById('recordingHint').classList.add('hidden');
    }

    function addMessage(content, isUser = false) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message-in ${isUser ? 'text-right' : ''}`;
      div.innerHTML = `
        <div class="inline-block max-w-[85%] ${isUser ? 'bg-indigo-500/20 text-white' : 'glass text-white/80'} rounded-2xl px-4 py-3 text-sm">
          ${content}
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderPlan(plan) {
      if (!plan || plan.length === 0) return;
      
      currentPlan = plan;
      const display = document.getElementById('planDisplay');
      const cards = document.getElementById('planCards');
      
      cards.innerHTML = plan.map((item, i) => `
        <div class="plan-card rounded-lg sm:rounded-xl px-3 sm:px-4 py-2 sm:py-3 message-in" style="animation-delay: ${i * 0.1}s">
          <div class="flex items-center justify-between gap-2">
            <div class="flex items-center gap-2 sm:gap-3 min-w-0">
              <span class="text-indigo-400/80 text-xs sm:text-sm font-medium flex-shrink-0">${item.time}</span>
              <span class="text-white/80 text-xs sm:text-sm truncate">${item.task}</span>
            </div>
            ${item.duration ? `<span class="text-white/30 text-xs flex-shrink-0 hidden sm:block">${item.duration}</span>` : ''}
          </div>
        </div>
      `).join('');
      
      display.classList.remove('hidden');
    }

    function clearPlan() {
      currentPlan = null;
      document.getElementById('planDisplay').classList.add('hidden');
    }

    function resetChat() {
      messages = [];
      currentPlan = null;
      document.getElementById('chat').innerHTML = '';
      document.getElementById('planDisplay').classList.add('hidden');
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addMessage(text, true);
      messages.push({ role: 'user', content: text });

      // Show loading
      const loadingId = Date.now();
      const chat = document.getElementById('chat');
      const loadingDiv = document.createElement('div');
      loadingDiv.id = `loading-${loadingId}`;
      loadingDiv.className = 'message-in';
      loadingDiv.innerHTML = `
        <div class="inline-block glass rounded-2xl px-4 py-3 text-sm text-white/40">
          思考中...
        </div>
      `;
      chat.appendChild(loadingDiv);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });

        const data = await res.json();
        
        // Remove loading
        document.getElementById(`loading-${loadingId}`)?.remove();

        // Add AI response
        addMessage(data.message);
        messages.push({ role: 'assistant', content: data.message });

        // Render plan if available
        if (data.type === 'plan' && data.plan) {
          renderPlan(data.plan);
        }

        // Show follow up if any
        if (data.followUp && data.followUp !== 'null' && data.followUp !== null) {
          setTimeout(() => {
            addMessage(data.followUp);
          }, 800);
        }

      } catch (error) {
        document.getElementById(`loading-${loadingId}`)?.remove();
        addMessage('网络似乎有点问题，再试一次？');
      }
    }
  </script>
</body>
</html>
